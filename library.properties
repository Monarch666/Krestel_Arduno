paragraph=Kestrel is a high-performance binary telemetry protocol built for UAV systems. Features CRC-16 integrity, optional ChaCha20-Poly1305 AEAD encryption (ESP32/ARM boards), priority QoS (4 levels), system/component routing, and a byte-by-byte stream parser ideal for UART links. Compatible with the full PC-side Kestrel reference implementation.
